# Research Powerpack MCP - Tool Configuration
# Optimized for LLM consumption - <1K tokens total
version: "1.0"

metadata:
  name: "mcp-researchpowerpack"
  description: "Parallel research tools with AI extraction"

# CORE PRINCIPLES (ALL TOOLS)
shared:
  philosophy: "MAXIMIZE inputs for parallel processing - NO time penalty for more items! More diverse inputs = better coverage = higher quality. Each input MUST target DIFFERENT angle - NO overlap/duplicates. ALWAYS use sequentialthinking between tool calls."

  workflow: |
    MANDATORY: THINK first (plan strategy) → EXECUTE with MAX diversity (use recommended counts) → THINK after (evaluate: what's missing? new angles discovered? gaps in coverage?) → ITERATE if needed (refine based on findings) → SYNTHESIZE final output.
    KEY INSIGHT: First research pass usually incomplete - reveals what you SHOULD have asked! Results are feedback - use them to ask better questions next iteration.

  iteration_triggers: "Iterate when: Results mention concepts you didn't research | Answers raise NEW questions | Initial scope too narrow | Related topics discovered you should explore"

tools:
  - name: search_reddit
    category: reddit
    capability: search
    limits: {min_queries: 3, max_queries: 50, recommended: 20}

    description: |
      MIN 3 queries, REC 20+ (3q=30 results, 20q=200 results). Each query MUST target DIFFERENT angle - NO overlap! Categories: 1) direct topic 2) recommendations (best/top) 3) specific tools/repos/names 4) comparisons (vs) 5) alternatives 6) subreddit targeting (r/macapps, r/opensource) 7) problems/issues/crashes 8) year-specific (2024/2025) 9) features 10) dev/GitHub. Operators: intitle:, "exact", OR, -exclude. Auto adds site:reddit.com.

    parameters:
      queries:
        type: array
        required: true
        items: {type: string}
        validation: {minItems: 3, maxItems: 50}
        description: "3-50 diverse queries. Each targets different angle: direct|best|tools|vs|alternative|r/sub|issues|2024|features|GitHub. NO overlap."
      date_after:
        type: string
        required: false
        description: "Filter after date (YYYY-MM-DD)"


  - name: fetch_reddit
    category: reddit
    capability: reddit
    limits: {min_urls: 2, max_urls: 50, recommended: 20, default_max_comments: 1000}
    extraction_suffix: "MUST-DO: Verify what Reddit says (quote consensus), follow external links mentioned, high info density, no filler, include upvote scores for top comments."

    description: |
      MIN 2 URLs, REC 10-20+. Auto comment budget: 1000 total (2 posts=500 each deep, 10=100 balanced, 20=50 broad coverage). Comments have BEST insights - always fetch_comments=true unless only need titles. use_llm=true for AI extraction (needs OPENROUTER_API_KEY) - synthesizes consensus, filters noise. Mix subreddits for diverse perspectives.

    parameters:
      urls:
        type: array
        required: true
        items: {type: string}
        validation: {minItems: 2, maxItems: 50}
        description: "2-50 Reddit URLs. Use search_reddit results as input."
      fetch_comments:
        type: boolean
        required: false
        default: true
        description: "Fetch comment trees (recommended true)."
      max_comments:
        type: number
        required: false
        default: 100
        description: "Optional comment budget override."
      use_llm:
        type: boolean
        required: false
        default: false
        description: "LLM summarization toggle (default false). Keep false for exact quote/code fidelity; enable for concise+comprehensive synthesis when requested."
      what_to_extract:
        type: string
        required: false
        description: "Optional extraction/synthesis targets when use_llm=true. You may request markdown tables or nested lists (max depth 5)."


  - name: deep_research
    category: research
    capability: deepResearch
    useZodSchema: true
    zodSchemaRef: "deepResearchParamsSchema"
    limits: {min_questions: 1, max_questions: 10, recommended: 5, min_length: 100, min_specific: 2}

    description: |
      MIN 2, REC 5-10 questions parallel. 32K tokens distributed (2q=16K/each deep, 5q=6.4K balanced, 10q=3.2K comprehensive). Structured question: GOAL, WHY, KNOWN, APPLY, 2-5 specific sub-questions. Optional: preferred sources, priority lens (performance/security/cost), output style (markdown tables or nested lists). ATTACH FILES for code Qs (bugs/perf/refactor/review/architecture). First pass usually incomplete - iterate based on findings.

    schemaDescriptions:
      questions: "2-10 structured questions. Each MUST cover different angle. Attach files for code-related questions."
      file_attachments: "Attach relevant code files when answer quality depends on your codebase. Use absolute paths and minimal focused ranges."


  - name: scrape_pages
    category: scrape
    capability: scraping
    useZodSchema: true
    zodSchemaRef: "scrapeLinksParamsSchema"
    limits: {min_urls: 1, max_urls: 50, recommended: 5, min_extract_len: 50, min_targets: 3}
    extraction_prefix: "MUST DO RULES: Produce concise yet comprehensive outputs with high information density. Format router: markdown tables for structured/comparative data; nested lists for hierarchical/process/causal explanations (max depth 5). For broad tasks, up to 50 markdown tables/sections if needed within token budget. NEVER hallucinate — only extract grounded info from document."
    extraction_suffix: "MUST: Comprehensive extraction, high info density, no verbosity, satisfy scope, NEVER hallucinate, only extract grounded info from document. No confirmation messages."

    description: |
      REC 3-5 URLs. use_llm=true by default — auto-filters nav/ads/footers, extracts ONLY what you specify, returns clean ready-to-use content. 32K tokens (3=10K each, 5=6K, 10=3K, 50=640). Formula: "Extract [t1] | [t2] | [t3] with focus on [a1], [a2]". Min 3 targets with | separator. Templates: Product (pricing|features|reviews|specs), Tech Docs (endpoints|auth|limits|errors|examples), Competitive (features|pricing|customers|USPs).

    schemaDescriptions:
      urls: "URLs to scrape (1-50; 3-5 recommended). More URLs broaden coverage but reduce per-URL extraction budget."
      timeout: "Timeout in seconds for each URL"
      use_llm: "Enable LLM extraction post-processing (default true). When enabled, strict MUST-DO formatting rules apply (concise+comprehensive, table/list routing). Set false for mostly raw cleaned content, lower latency/cost, or when LLM extraction is unavailable."
      what_to_extract: "Extraction targets/focus. Prefer compact, specific targets (pipe-separated works well), e.g. \"pricing tiers|limits|auth flows with focus on free tier and rate limits\". You may request output style: markdown tables or nested lists (max depth 5)."
      model: "Override the LLM extraction model for this request. Uses OpenRouter model IDs (e.g. \"openai/gpt-4o\", \"anthropic/claude-sonnet-4\", \"google/gemini-2.5-flash\"). Default: openai/gpt-oss-120b:nitro (configurable via LLM_EXTRACTION_MODEL env var)."


  - name: search_google
    category: search
    capability: search
    useZodSchema: true
    zodSchemaRef: "webSearchParamsSchema"
    limits: {min_keywords: 3, max_keywords: 100, recommended: 7}

    description: |
      MIN 3, REC 5-7 keywords parallel Google search. 10 results/keyword (3=30 results, 7=70, 100=1000). Each keyword = separate search - MUST be diverse angles! Operators: site:domain.com, "exact phrase", -exclude, filetype:pdf, OR. CRITICAL: Search only gives URLs - MUST follow with scrape_pages to get actual content! Workflow: search_google → scrape_pages (MANDATORY) → iterate → synthesize.

    schemaDescriptions:
      keywords: "3-100 search keywords (5-7 recommended). Each keyword runs as a separate parallel Google search; keep angles diverse for better coverage."
